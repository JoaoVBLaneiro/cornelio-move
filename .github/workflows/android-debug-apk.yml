name: Android Debug APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: motorista-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: motorista-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android
        env:
          EXPO_PUBLIC_BACKEND_URL: http://207.180.245.177:3001
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build debug APK
        env:
          EXPO_PUBLIC_BACKEND_URL: http://207.180.245.177:3001
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CornelioMoveMotorista-v9-debug-apk
          path: motorista-app/android/app/build/outputs/apk/debug/app-debug.apk
