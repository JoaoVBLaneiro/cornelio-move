name: Android Release APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    defaults:
      run:
        working-directory: motorista-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: motorista-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android
        env:
          CI: 1
          EXPO_PUBLIC_BACKEND_URL: http://207.180.245.177:3001
        run: npx expo prebuild --platform android --clean

	      - name: Patch MainActivity lockscreen fullscreen
        run: |
          python3 - <<'PY'
          from pathlib import Path

          files = list(Path("android/app/src/main/java").rglob("MainActivity.kt"))
          if not files:
              raise SystemExit("MainActivity.kt nao encontrado")

          p = files[0]
          s = p.read_text()

          def add_import(text, imp):
              if imp in text:
                  return text
              return text.replace("import android.os.Bundle\n", "import android.os.Bundle\n" + imp + "\n")

          s = add_import(s, "import android.app.KeyguardManager")
          s = add_import(s, "import android.os.Build")
          s = add_import(s, "import android.view.WindowManager")

          if "private fun habilitarTelaCheiaSobreBloqueio()" not in s:
              bloco = '''    super.onCreate(null)
              habilitarTelaCheiaSobreBloqueio()
            }

            private fun habilitarTelaCheiaSobreBloqueio() {
              window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)

              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O_MR1) {
                setShowWhenLocked(true)
                setTurnScreenOn(true)

                val keyguardManager = getSystemService(KeyguardManager::class.java)
                keyguardManager?.requestDismissKeyguard(this, null)
              } else {
                window.addFlags(
                  WindowManager.LayoutParams.FLAG_SHOW_WHEN_LOCKED or
                    WindowManager.LayoutParams.FLAG_TURN_SCREEN_ON or
                    WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON
                )
              }
            }

            override fun onResume() {
              super.onResume()
              habilitarTelaCheiaSobreBloqueio()
            }'''

              if "    super.onCreate(null)\n  }" in s:
                  s = s.replace("    super.onCreate(null)\n  }", bloco)
              elif "    super.onCreate(savedInstanceState)\n  }" in s:
                  s = s.replace("    super.onCreate(savedInstanceState)\n  }", bloco.replace("super.onCreate(null)", "super.onCreate(savedInstanceState)"))
              else:
                  raise SystemExit("Nao encontrei o trecho super.onCreate para aplicar patch")

          p.write_text(s)
          print("MainActivity.kt patch aplicado em", p)
          PY

      - name: Install Android NDK
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          for attempt in 1 2 3; do
            echo "Tentativa $attempt de instalar NDK 27.1.12297006"
            rm -rf "$ANDROID_HOME/ndk/27.1.12297006"
            rm -rf "$ANDROID_HOME/.temp"
            if "$SDKMANAGER" "ndk;27.1.12297006"; then
              echo "NDK instalado com sucesso"
              exit 0
            fi
            echo "Falhou, tentando novamente em 10s..."
            sleep 10
          done
          echo "Falha ao instalar NDK depois de 3 tentativas"
          exit 1

      - name: Build release APK
        env:
          EXPO_PUBLIC_BACKEND_URL: http://207.180.245.177:3001
        run: cd android && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CornelioMoveMotorista-v9-release-apk
          path: motorista-app/android/app/build/outputs/apk/release/app-release.apk
